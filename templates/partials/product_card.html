<article class="tm-product-card">
    <a class="tm-product-image" href="{% url 'productDetail' product.id %}">
        {% if product.Image %}
            <img src="{{ product.Image.url }}" alt="{{ product.ProductName }}">
        {% else %}
            <div class="tm-image-placeholder">{{ product.ProductName|slice:":2" }}</div>
        {% endif %}
        {% if product.brand %}
        <span class="product-brand-badge" style="background:{{ product.brand.color }}cc;"><span class="brand-logo-wrapper" {% if product.brand.brand_name == 'Xiaomi' %}style="background: {{ product.brand.color }};"{% endif %}><img src="{{ product.brand.logo_url }}" class="brand-logo-img" alt="{{ product.brand.brand_name }}"></span> {{ product.brand.brand_name }}</span>
        {% endif %}
    </a>
    <div class="tm-product-body">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <p class="tm-product-category mb-0">{{ product.Category.CategoryName }}</p>
            <span class="badge rounded-pill badge-soft-primary" style="font-size: 0.75rem; padding: 0.25rem 0.5rem;">
                💎 竞争力 {{ product.competitiveness_score }}%
            </span>
        </div>
        <h3>{{ product.ProductName }}</h3>
        <div class="tm-product-meta">
            <span>¥{{ product.Price }}</span>
            <a href="{% url 'productDetail' product.id %}">查看详情</a>
        </div>
    </div>
</article>
